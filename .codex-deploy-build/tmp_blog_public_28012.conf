server {
    listen 28012;
    listen [::]:28012;
    server_name _;

    client_max_body_size 25m;

    location = /css/mobile.css {
        alias /var/www/blog-mobile-override/mobile.css;
        default_type text/css;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires -1;
    }

    location / {
        proxy_pass http://127.0.0.1:18012;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;

        sub_filter_once off;
        sub_filter_types text/html;

        sub_filter 'Mobile Edition' '随时看看';
        sub_filter 'Handheld Reading Mode' '手机阅读';
        sub_filter 'Pocket Blog' '首页';
        sub_filter '一套桌面端，一套手机版，各自独立显示。' '在手机上也能舒服地看博客';
        sub_filter '手机端优先显示这套轻量界面，阅读、搜索、评论、计划和写作入口都保留；桌面端继续使用原模板，不互相干扰。' '文章、搜索、评论、计划和个人空间都保留了，手机和电脑各用各的页面，不会互相影响。';
        sub_filter '搜索博客' '搜索内容';
        sub_filter '同步文章' '文章总数';
        sub_filter '本月热度' '本月推荐';
        sub_filter '消息未读' '未读消息';
        sub_filter '快捷入口' '常用入口';
        sub_filter '把最常用的手机路径压缩成一屏内可触达的入口。' '把常看的、常用的都放在这里，找起来更快。';
        sub_filter '更多榜单' '查看榜单';
        sub_filter '站内搜索' '搜索内容';
        sub_filter '快速找文章、计划和关键词' '按标题、分类或关键词找文章。';
        sub_filter '计划分区' '专题计划';
        sub_filter '按专题路线连续阅读' '按主题连续阅读，不用一篇篇翻。';
        sub_filter '先注册账号，再用手机直接管理博客' '注册后就能管理自己的文章和草稿。';
        sub_filter '根据点赞数挑出本月更受欢迎的文章。' '最近这段时间更受欢迎的文章。';
        sub_filter ' 篇内容正在移动端同步展示' ' 篇内容，按时间更新';
        sub_filter '阅读全文' '继续阅读';
        sub_filter '<span class="mb-hero-kicker">Posts</span>' '<span class="mb-hero-kicker">文章</span>';
        sub_filter '这是独立的移动版文章列表，保持单列信息密度，适合手机浏览器连续阅读。' '这里按分类整理了站内文章，手机上直接滑动浏览就行，想看哪一类就切过去。';
        sub_filter '<span class="mb-hero-kicker">Rankings</span>' '<span class="mb-hero-kicker">排行榜</span>';
        sub_filter '手机端排行榜' '最近谁更活跃';
        sub_filter '把活跃作者和高热文章压缩成单列卡片，滑动查看更顺手。' '看看这段时间谁写得多、哪些文章更受欢迎，手机上也能顺手翻完这两份榜单。';
        sub_filter '按本周发布文章数量和点赞数实时统计' '按当前周期内发布的文章数量统计';
        sub_filter '<span class="mb-hero-kicker">Sign In</span>' '<span class="mb-hero-kicker">登录</span>';
        sub_filter '登录后继续管理你的博客。' '登录后继续管理你的博客';
        sub_filter '手机端保留完整登录流程，审核状态、草稿箱、消息中心都可以直接访问。' '登录后可以查看审核状态、草稿、消息和个人资料。能不能发文，还是以实名认证结果为准。';
        sub_filter '<span class="mb-kicker">About</span>' '<span class="mb-kicker">关于</span>';
        sub_filter '这是博客的手机版前端。' '在手机上看，也该顺手一点';
        sub_filter '桌面端保留原来的完整布局，手机端改成口袋阅读模式，适合在浏览器里直接看文章、评论和管理自己的内容。' '这里保留了博客原本的内容和功能，只是把阅读、写作和互动重新整理成更适合小屏幕的方式。';
        sub_filter '当前支持' '现在支持什么';
        sub_filter '手机版和桌面版共用后端数据，但前端模板完全分流。' '内容是同一套，页面和交互按手机浏览重新排过。';
        sub_filter '内容创作' '内容发布';
        sub_filter '互动体验' '互动功能';
        sub_filter '文章点赞、评论回复、评论表情和消息提醒都在手机端保留。' '点赞、评论、回复、表情和消息提醒，在手机上都能正常使用。';
        sub_filter '专题计划' '专题整理';
        sub_filter '计划分区和个人空间都做了移动端页面，不再依赖桌面版缩放显示。' '计划分区和个人空间也都单独整理过，不用再把桌面页缩小来凑合看。';
        sub_filter '切换方式' '怎么切换';
        sub_filter '手机浏览器会自动进入移动版模板。' '用手机浏览器打开时，会优先进入这一套更适合小屏阅读的页面。';
        sub_filter '如果你想临时查看桌面版，可以在任意移动页右上角点击“桌面版”，或在 URL 后面带上 `?device=desktop`。' '如果你想临时查看桌面版，可以点右上角的“桌面版”，或者在地址后加上 `?device=desktop`。';
        sub_filter '桌面浏览器同理可以用 `?device=mobile` 预览手机模板。' '在电脑上也可以用 `?device=mobile` 直接切过来看。';
    }
}
