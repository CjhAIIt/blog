<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客系统测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">博客系统测试</h1>
        
        <div class="test-section">
            <h2>1. 应用程序状态测试</h2>
            <button class="btn btn-primary" onclick="testAppStatus()">测试应用程序状态</button>
            <div id="appStatusResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>2. 用户注册测试</h2>
            <form id="registrationForm">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            <div id="registrationResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>3. 用户登录测试</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="loginUsername" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="loginUsername" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">密码</label>
                    <input type="password" class="form-control" id="loginPassword" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            <div id="loginResult" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>4. 快速测试</h2>
            <button class="btn btn-success" onclick="quickTest()">一键测试注册和登录</button>
            <div id="quickTestResult" class="result"></div>
        </div>
    </div>

    <script>
        // 测试应用程序状态
        function testAppStatus() {
            const resultDiv = document.getElementById('appStatusResult');
            resultDiv.innerHTML = '<div class="info">正在测试应用程序状态...</div>';
            
            fetch('http://localhost:8081/')
                .then(response => {
                    if (response.ok) {
                        resultDiv.innerHTML = '<div class="success">应用程序正在运行，状态正常</div>';
                        return true;
                    } else {
                        resultDiv.innerHTML = '<div class="error">应用程序响应异常，状态码: ' + response.status + '</div>';
                        return false;
                    }
                })
                .catch(error => {
                    resultDiv.innerHTML = '<div class="error">无法连接到应用程序: ' + error.message + '</div>';
                    return false;
                });
        }
        
        // 用户注册表单提交
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('registrationResult');
            resultDiv.innerHTML = '<div class="info">正在注册用户...</div>';
            
            const formData = new FormData(this);
            
            fetch('http://localhost:8081/register', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success">注册请求已发送，请检查是否重定向到登录页面</div>';
                    return response.text();
                } else {
                    resultDiv.innerHTML = '<div class="error">注册失败，状态码: ' + response.status + '</div>';
                    return response.text();
                }
            })
            .then(html => {
                if (html.includes('login') || html.includes('登录')) {
                    resultDiv.innerHTML = '<div class="success">注册成功！已重定向到登录页面</div>';
                } else if (html.includes('error') || html.includes('错误')) {
                    resultDiv.innerHTML = '<div class="error">注册过程中出现错误</div>';
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="error">注册请求失败: ' + error.message + '</div>';
            });
        });
        
        // 用户登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<div class="info">正在登录...</div>';
            
            const formData = new FormData(this);
            
            fetch('http://localhost:8081/login', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success">登录请求已发送，请检查是否重定向到主页</div>';
                    return response.text();
                } else {
                    resultDiv.innerHTML = '<div class="error">登录失败，状态码: ' + response.status + '</div>';
                    return response.text();
                }
            })
            .then(html => {
                if (html.includes('index') || html.includes('首页') || html.includes('logout') || html.includes('退出')) {
                    resultDiv.innerHTML = '<div class="success">登录成功！已重定向到主页</div>';
                } else if (html.includes('error') || html.includes('错误') || html.includes('bad credentials')) {
                    resultDiv.innerHTML = '<div class="error">登录失败：用户名或密码错误</div>';
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="error">登录请求失败: ' + error.message + '</div>';
            });
        });
        
        // 快速测试
        function quickTest() {
            const resultDiv = document.getElementById('quickTestResult');
            resultDiv.innerHTML = '<div class="info">开始快速测试...</div>';
            
            // 生成随机用户名
            const timestamp = new Date().getTime();
            const username = 'testuser' + timestamp;
            const email = username + '@test.com';
            const password = 'testpass123';
            
            // 填充注册表单
            document.getElementById('username').value = username;
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            document.getElementById('confirmPassword').value = password;
            
            // 提交注册表单
            document.getElementById('registrationForm').dispatchEvent(new Event('submit'));
            
            // 等待2秒后填充登录表单并提交
            setTimeout(() => {
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = password;
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                
                resultDiv.innerHTML = '<div class="info">已完成注册和登录测试，请查看上方结果</div>';
            }, 2000);
        }
        
        // 页面加载时自动测试应用程序状态
        window.onload = function() {
            testAppStatus();
        };
    </script>
</body>
</html>
