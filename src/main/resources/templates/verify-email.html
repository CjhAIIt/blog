<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证 - 烂柯的博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">烂柯的博客</span>
            </a>
        </header>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div class="ll-auth-layout">
            <section class="ll-auth-side ll-fade">
                <span class="ll-auth-kicker">Verify Email</span>
                <h1 class="ll-auth-title">完成邮箱验证后才能登录。</h1>
                <p class="ll-auth-copy">注册完成后系统会发送 6 位验证码到你的邮箱。验证码有效期 10 分钟，验证通过后账号才会启用。</p>
            </section>

            <section class="ll-auth-card ll-fade">
                <span class="ll-auth-kicker">Code</span>
                <h2 class="ll-side-title">输入邮箱验证码</h2>
                <p class="ll-side-text">如果当前还是开发模式，验证码会写到服务器日志中。</p>

                <div th:if="${successMessage}" class="ll-status ll-status--success"><span th:text="${successMessage}"></span></div>
                <div th:if="${error}" class="ll-status ll-status--error"><span th:text="${error}"></span></div>

                <form action="/verify-email" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="email">邮箱</label>
                        <input class="ll-input" type="email" id="email" name="email" th:value="${email}" required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="code">验证码</label>
                        <input class="ll-input" type="text" id="code" name="code" placeholder="6 位验证码" required>
                    </div>
                    <div class="ll-form-actions">
                        <button class="ll-btn" type="submit">完成验证</button>
                    </div>
                </form>

                <form action="/verify-email/resend" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="email" th:value="${email}">
                    <div class="ll-form-actions">
                        <button class="ll-btn-secondary" type="submit">重新发送验证码</button>
                        <a class="ll-btn-secondary" href="/login">返回登录</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>
</body>
</html>
