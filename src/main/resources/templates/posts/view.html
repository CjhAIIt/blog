<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' - 简单博客系统'">文章详情 - 简单博客系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .post-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .post-meta {
            color: #6c757d;
            font-size: 0.9rem;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        footer {
            margin-top: 50px;
            padding: 20px 0;
            background-color: #343a40;
            color: white;
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }
        .comment-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">简单博客</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/posts">所有文章</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">关于</a>
                    </li>
                </ul>
                <form class="d-flex" action="/search" method="get">
                    <input class="form-control me-2" type="search" name="keyword" placeholder="搜索文章...">
                    <button class="btn btn-outline-light" type="submit">搜索</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <article>
                    <h1 class="mb-4" th:text="${post.title}">文章标题</h1>
                    
                    <div class="post-meta">
                        <div class="row">
                            <div class="col-md-6">
                                <span><strong>作者:</strong> <span th:text="${post.author.username}"></span></span>
                            </div>
                            <div class="col-md-6 text-md-end">
                                <span><strong>发布时间:</strong> <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                            </div>
                        </div>
                        <div class="row mt-2" th:if="${post.updatedAt != post.createdAt}">
                            <div class="col-12">
                                <span><strong>更新时间:</strong> <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="post-content" th:text="${post.content}">
                        文章内容...
                    </div>
                    
                    <div class="mt-4">
                        <a href="/posts" class="btn btn-outline-secondary">返回文章列表</a>
                        <a th:href="@{/posts/edit/{id}(id=${post.id})}" class="btn btn-outline-primary">编辑文章</a>
                        <form th:action="@{/posts/delete/{id}(id=${post.id})}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-outline-danger" onclick="return confirm('确定要删除这篇文章吗？')">删除文章</button>
                        </form>
                    </div>
                </article>
                
                <div class="comment-section">
                    <h3>评论</h3>
                    <p>评论功能正在开发中...</p>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">关于作者</h5>
                    </div>
                    <div class="card-body">
                        <h6 th:text="${post.author.username}">作者名</h6>
                        <p class="text-muted" th:text="'邮箱: ' + ${post.author.email}">作者邮箱</p>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="card-title mb-0">操作</h5>
                    </div>
                    <div class="card-body">
                        <a th:href="@{/posts/edit/{id}(id=${post.id})}" class="btn btn-primary btn-sm mb-2 d-block">编辑文章</a>
                        <form th:action="@{/posts/delete/{id}(id=${post.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm mb-2 d-block w-100" onclick="return confirm('确定要删除这篇文章吗？')">删除文章</button>
                        </form>
                        <a href="/posts/new" class="btn btn-outline-primary btn-sm mb-2 d-block">写新文章</a>
                        <a href="/posts" class="btn btn-outline-secondary btn-sm d-block">返回文章列表</a>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="card-title mb-0">快速链接</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li><a href="/" class="text-decoration-none">首页</a></li>
                            <li><a href="/posts" class="text-decoration-none">所有文章</a></li>
                            <li><a href="/posts/new" class="text-decoration-none">写文章</a></li>
                            <li><a href="/about" class="text-decoration-none">关于我们</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2023 简单博客系统. 使用 Spring Boot 构建.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
