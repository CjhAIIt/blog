<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${(post.id == null ? '发布文章' : '编辑文章') + ' - 博客'}">发布文章</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-compose-page">
<form th:object="${post}"
      th:action="${post.id == null ? '/posts' : '/posts/update/' + post.id}"
      method="post"
      enctype="multipart/form-data"
      class="ll-compose-form"
      th:attr="data-local-draft-key=${editorLocalDraftKey}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <input type="hidden" name="defaultCoverSelection" id="defaultCoverSelection" th:value="${post.coverImageUrl != null and #strings.startsWith(post.coverImageUrl, '/images/default-covers/') ? post.coverImageUrl : ''}">

    <header class="ll-compose-topbar">
        <div class="ll-compose-brand">
            <a class="ll-compose-logo" href="/">LK</a>
            <a class="ll-compose-back" href="/space">‹</a>
            <strong th:text="${post.id == null ? '发布文章' : '编辑文章'}">发布文章</strong>
            <select class="ll-compose-top-select" id="category" th:field="*{category}">
                <option th:each="category : ${postCategories}" th:value="${category}" th:text="${category.displayName}">项目</option>
            </select>
        </div>
        <div class="ll-compose-user">
            <a href="/space/drafts">草稿箱</a>
            <a href="/notifications">消息</a>
            <a href="/space">个人空间</a>
        </div>
    </header>

    <nav class="ll-compose-toolbar" aria-label="编辑工具栏">
        <button type="button" data-command="undo"><strong>↶</strong><span>撤销</span></button>
        <button type="button" data-command="redo"><strong>↷</strong><span>前进</span></button>
        <span class="ll-compose-toolbar-divider"></span>
        <button type="button" data-command="h2"><strong>H</strong><span>标题</span></button>
        <button type="button" data-command="bold"><strong>B</strong><span>加粗</span></button>
        <button type="button" data-command="quote"><strong>“</strong><span>引用</span></button>
        <button type="button" data-command="code"><strong>&lt;/&gt;</strong><span>代码</span></button>
        <button type="button" data-command="list"><strong>☷</strong><span>列表</span></button>
        <button type="button" data-command="link"><strong>⛓</strong><span>链接</span></button>
        <span class="ll-compose-toolbar-divider"></span>
        <button type="button" data-command="import-md"><strong>MD</strong><span>导入MD</span></button>
        <button type="button" data-command="image"><strong>▧</strong><span>上传图片</span></button>
        <button type="button" data-command="preview"><strong>◐</strong><span>后端预览</span></button>
        <input type="file" id="editorImageFile" accept="image/*" hidden>
        <input type="file" id="editorMarkdownFile" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
    </nav>

    <main class="ll-compose-main">
        <aside class="ll-compose-outline">
            <div class="ll-compose-panel-head">
                <span>目录</span>
                <button type="button" id="outlineCollapseButton">|‹</button>
            </div>
            <div id="editorOutline" class="ll-compose-outline-list">
                <div class="ll-compose-outline-empty">为文内增加标题，这里将生成目录</div>
            </div>
        </aside>

        <section class="ll-compose-paper">
            <div class="ll-compose-title-row">
                <input class="ll-compose-title-input"
                       type="text"
                       id="title"
                       th:field="*{title}"
                       maxlength="100"
                       placeholder="请输入文章标题（5～100个字）">
                <div class="ll-compose-title-help">
                    <span id="titleHint">还需输入 5 个字</span>
                </div>
            </div>

            <div class="ll-compose-title-line"></div>

            <textarea class="ll-compose-textarea"
                      id="content"
                      th:field="*{content}"></textarea>
            <div class="ll-compose-preview-surface" id="composePreviewSurface" hidden>
                <div class="ll-compose-preview-empty">正文为空，暂时没有可预览内容。</div>
            </div>
        </section>

    </main>

    <section class="ll-compose-settings" id="composeSettings" hidden>
        <div class="ll-compose-settings-head">
            <strong>发文设置</strong>
            <button type="button" id="settingsClose">收起</button>
        </div>
        <div class="ll-compose-settings-grid">
            <label>
                展示字体
                <select class="ll-select" id="fontKey" th:field="*{fontKey}">
                    <option th:each="font : ${editorFonts}" th:value="${font.key}" th:text="${font.label}" th:attr="data-font-stack=${font.cssStack}">字体</option>
                </select>
            </label>
            <label>
                定时发布时间
                <input class="ll-input" type="datetime-local" id="scheduledPublishAt" name="scheduledPublishAt" th:value="${post.scheduledPublishAt != null ? #temporals.format(post.scheduledPublishAt, 'yyyy-MM-dd''T''HH:mm') : ''}">
            </label>
            <label>
                加入计划
                <select class="ll-select" id="planSelection" name="planSelection">
                    <option value="none" th:selected="${post.plan == null}">不加入计划</option>
                    <option value="existing" th:selected="${post.plan != null}">加入已有计划</option>
                    <option value="new">新建计划并加入</option>
                </select>
            </label>
            <label class="plan-existing-field">
                选择已有计划
                <select class="ll-select" id="existingPlanId" name="existingPlanId">
                    <option value="" th:if="${#lists.isEmpty(userPlans)}">当前还没有可加入的计划</option>
                    <option th:each="plan : ${userPlans}" th:value="${plan.id}" th:text="${plan.name + ' · ' + plan.accessTypeDisplayName}" th:selected="${post.plan != null && post.plan.id == plan.id}"></option>
                </select>
            </label>
            <label class="plan-new-field">
                新计划名称
                <input class="ll-input" type="text" id="newPlanName" name="newPlanName" placeholder="例如：Spring 系列计划">
            </label>
            <label class="plan-new-field">
                新计划类型
                <select class="ll-select" id="newPlanAccessType" name="newPlanAccessType">
                    <option value="PRIVATE">私密计划</option>
                    <option value="COLLABORATIVE">共创计划</option>
                </select>
            </label>
            <label class="plan-order-field">
                章节号
                <input class="ll-input" type="number" id="planOrder" name="planOrder" th:value="${post.planOrder}" min="1" placeholder="留空自动顺延">
            </label>
            <label>
                上传封面
                <input class="ll-input" type="file" id="coverFile" name="coverFile" accept="image/*">
            </label>
            <label class="ll-compose-checkbox">
                <input type="checkbox" name="useDefaultCover" value="true">
                恢复系统默认封面
            </label>
        </div>

        <div class="ll-compose-cover-grid">
            <button class="ll-compose-cover-option"
                    type="button"
                    th:each="cover : ${defaultCoverOptions}"
                    th:classappend="${post.coverImageUrl == cover.url ? ' is-selected' : ''}"
                    th:attr="data-cover-url=${cover.url}">
                <img th:src="${cover.url}" th:alt="${cover.label}">
                <span th:text="${cover.label}">封面</span>
            </button>
        </div>
    </section>

    <footer class="ll-compose-bottombar">
        <div class="ll-compose-counts">
            <span>共 <strong id="editorWordCount">0</strong> 字</span>
            <button type="button" id="settingsToggle">发文设置⌄</button>
            <span id="editorDraftState">未暂存</span>
        </div>
        <div class="ll-compose-actions">
            <button class="ll-compose-secondary" type="submit" name="action" value="draft">保存草稿⌄</button>
            <button class="ll-compose-secondary" type="submit" name="action" value="schedule">定时发布 ›</button>
            <button class="ll-compose-primary" type="submit" name="action" value="publish">发布博客</button>
        </div>
    </footer>
</form>

<script>
    const form = document.querySelector('.ll-compose-form');
    const titleInput = document.getElementById('title');
    const textarea = document.getElementById('content');
    const outline = document.getElementById('editorOutline');
    const titleHint = document.getElementById('titleHint');
    const wordCount = document.getElementById('editorWordCount');
    const draftState = document.getElementById('editorDraftState');
    const settings = document.getElementById('composeSettings');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsClose = document.getElementById('settingsClose');
    const previewSurface = document.getElementById('composePreviewSurface');
    const previewCommandButton = document.querySelector('[data-command="preview"]');
    const previewCommandLabel = previewCommandButton?.querySelector('span');
    const planSelection = document.getElementById('planSelection');
    const imageInput = document.getElementById('editorImageFile');
    const markdownInput = document.getElementById('editorMarkdownFile');
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const localDraftKey = 'll-compose-' + form.dataset.localDraftKey;
    let draftTimer;
    const undoStack = [];
    const redoStack = [];
    let lastSnapshot = '';
    let restoringHistory = false;
    let previewMode = false;

    function textTokens(value) {
        return (value || '').replace(/[#>*_`~\-[\]()]/g, ' ').match(/[\u4e00-\u9fa5]|\b[\w-]+\b/g) || [];
    }

    function updateTitleHint() {
        const length = titleInput.value.trim().length;
        titleHint.textContent = length < 5 ? '还需输入 ' + (5 - length) + ' 个字' : length + '/100';
    }

    function getHeadingEntries() {
        return textarea.value
            .split('\n')
            .map((line, lineIndex) => {
                const match = line.match(/^(#{1,3})\s+(.+)$/);
                return match ? {level: match[1].length, text: match[2].trim(), lineIndex} : null;
            })
            .filter(Boolean);
    }

    function markActiveOutline(activeIndex) {
        outline.querySelectorAll('.ll-compose-outline-link').forEach((button, index) => {
            button.classList.toggle('is-active', index === activeIndex);
        });
    }

    function setPreviewMode(active) {
        previewMode = active;
        textarea.hidden = active;
        previewSurface.hidden = !active;
        document.body.classList.toggle('is-compose-previewing', active);
        if (previewCommandLabel) {
            previewCommandLabel.textContent = active ? '返回编辑' : '后端预览';
        }
    }

    function switchToEdit(focusEditor) {
        if (!previewMode) return;
        setPreviewMode(false);
        if (focusEditor) {
            textarea.focus();
        }
    }

    function scrollEditorToLine(lineIndex) {
        setPreviewMode(false);
        const lines = textarea.value.split('\n');
        let offset = 0;
        for (let i = 0; i < lineIndex; i += 1) {
            offset += lines[i].length + 1;
        }
        textarea.focus();
        textarea.setSelectionRange(offset, Math.min(offset + lines[lineIndex].length, textarea.value.length));
        const lineHeight = parseFloat(getComputedStyle(textarea).lineHeight) || 30;
        textarea.scrollTop = Math.max(0, lineIndex * lineHeight - textarea.clientHeight * 0.25);
    }

    function syncPreviewHeadingTargets() {
        previewSurface.querySelectorAll('h1, h2, h3').forEach((heading, index) => {
            heading.id = heading.id || 'preview-heading-' + index;
            heading.dataset.outlineIndex = String(index);
        });
    }

    function scrollPreviewToHeading(index) {
        const target = previewSurface.querySelectorAll('h1, h2, h3')[index];
        if (!target) return;
        target.scrollIntoView({behavior: 'smooth', block: 'start'});
        markActiveOutline(index);
    }

    function renderOutline() {
        const headings = getHeadingEntries();
        outline.innerHTML = '';
        if (!headings.length) {
            outline.innerHTML = '<div class="ll-compose-outline-empty">为文内增加标题，这里将生成目录</div>';
            return;
        }
        headings.forEach((item, index) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'll-compose-outline-link level-' + item.level;
            button.textContent = item.text;
            button.dataset.headingIndex = String(index);
            button.addEventListener('click', () => {
                markActiveOutline(index);
                if (previewMode) {
                    scrollPreviewToHeading(index);
                } else {
                    scrollEditorToLine(item.lineIndex);
                }
            });
            outline.appendChild(button);
        });
    }

    function updateMetrics() {
        wordCount.textContent = textTokens(textarea.value).length.toLocaleString('zh-CN');
        updateTitleHint();
        renderOutline();
    }

    function snapshotEditor() {
        return JSON.stringify({title: titleInput.value, content: textarea.value});
    }

    function restoreSnapshot(snapshot) {
        const parsed = JSON.parse(snapshot);
        switchToEdit(false);
        restoringHistory = true;
        titleInput.value = parsed.title || '';
        textarea.value = parsed.content || '';
        restoringHistory = false;
        scheduleDraftSave();
        updateMetrics();
    }

    function pushHistory() {
        if (restoringHistory) return;
        const current = snapshotEditor();
        if (current === lastSnapshot) return;
        undoStack.push(lastSnapshot);
        if (undoStack.length > 80) undoStack.shift();
        redoStack.length = 0;
        lastSnapshot = current;
    }

    function undoEdit() {
        if (!undoStack.length) return;
        redoStack.push(snapshotEditor());
        const previous = undoStack.pop();
        lastSnapshot = previous;
        restoreSnapshot(previous);
        draftState.textContent = '已撤销';
    }

    function redoEdit() {
        if (!redoStack.length) return;
        undoStack.push(snapshotEditor());
        const next = redoStack.pop();
        lastSnapshot = next;
        restoreSnapshot(next);
        draftState.textContent = '已前进';
    }

    function saveLocalDraft() {
        localStorage.setItem(localDraftKey, JSON.stringify({
            title: titleInput.value,
            content: textarea.value,
            updatedAt: Date.now()
        }));
        draftState.textContent = '已本地暂存';
    }

    function scheduleDraftSave() {
        draftState.textContent = '编辑中';
        clearTimeout(draftTimer);
        draftTimer = setTimeout(saveLocalDraft, 350);
    }

    function insertText(prefix, suffix, placeholder) {
        switchToEdit(true);
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selected = textarea.value.slice(start, end) || placeholder || '';
        textarea.setRangeText(prefix + selected + (suffix || ''), start, end, 'end');
        textarea.focus();
        pushHistory();
        scheduleDraftSave();
        updateMetrics();
    }

    function insertBlock(snippet) {
        switchToEdit(true);
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const prefix = textarea.value && !textarea.value.endsWith('\n') ? '\n' : '';
        textarea.setRangeText(prefix + snippet + '\n', start, end, 'end');
        textarea.focus();
        pushHistory();
        scheduleDraftSave();
        updateMetrics();
    }

    async function applyBackendFormat(command) {
        switchToEdit(true);
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = textarea.value.slice(start, end);
        draftState.textContent = '正在应用格式';
        try {
            const response = await fetch('/posts/format', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', [csrfHeader]: csrfToken},
                body: JSON.stringify({command, selectedText})
            });
            const payload = await response.json();
            if (!response.ok) {
                draftState.textContent = payload.message || '格式应用失败';
                return;
            }
            textarea.setRangeText(payload.replacement || '', start, end, 'end');
            textarea.focus();
            pushHistory();
            scheduleDraftSave();
            updateMetrics();
            draftState.textContent = '格式已应用';
        } catch (error) {
            draftState.textContent = '格式应用失败';
        }
    }

    async function uploadEditorImage(file) {
        if (!file) return;
        const formData = new FormData();
        formData.append('imageFile', file);
        draftState.textContent = '上传图片中';
        const response = await fetch('/posts/images', {
            method: 'POST',
            headers: {[csrfHeader]: csrfToken},
            body: formData
        });
        const payload = await response.json();
        if (response.ok) {
            insertBlock(payload.html || payload.markdown);
            draftState.textContent = '图片已插入';
        } else {
            draftState.textContent = payload.message || '图片上传失败';
        }
        imageInput.value = '';
    }

    async function importMarkdownFile(file) {
        if (!file) return;
        switchToEdit(true);
        const formData = new FormData();
        formData.append('markdownFile', file);
        draftState.textContent = '正在导入 MD';
        try {
            const response = await fetch('/posts/import/content', {
                method: 'POST',
                headers: {[csrfHeader]: csrfToken},
                body: formData
            });
            const payload = await response.json();
            if (!response.ok) {
                draftState.textContent = payload.message || 'MD 导入失败';
                return;
            }
            if (!titleInput.value.trim()) {
                titleInput.value = payload.title || '';
            }
            if (textarea.value.trim()) {
                textarea.value = textarea.value.replace(/\s*$/, '') + '\n\n' + (payload.content || '');
            } else {
                textarea.value = payload.content || '';
            }
            pushHistory();
            scheduleDraftSave();
            updateMetrics();
            draftState.textContent = 'MD 已导入';
        } catch (error) {
            draftState.textContent = 'MD 导入失败';
        } finally {
            markdownInput.value = '';
        }
    }

    async function requestBackendPreview(targetHeadingIndex) {
        if (previewMode && targetHeadingIndex === undefined) {
            switchToEdit(true);
            return;
        }
        setPreviewMode(true);
        previewSurface.innerHTML = '<div class="ll-compose-preview-empty">正在生成预览...</div>';
        draftState.textContent = '正在生成预览';
        try {
            const response = await fetch('/posts/preview', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8', [csrfHeader]: csrfToken},
                body: 'content=' + encodeURIComponent(textarea.value)
            });
            const html = await response.text();
            previewSurface.innerHTML = html && html.trim()
                ? html
                : '<div class="ll-compose-preview-empty">正文为空，暂时没有可预览内容。</div>';
            syncPreviewHeadingTargets();
            draftState.textContent = '预览已生成';
            if (targetHeadingIndex !== undefined) {
                requestAnimationFrame(() => scrollPreviewToHeading(targetHeadingIndex));
            }
        } catch (error) {
            previewSurface.innerHTML = '<div class="ll-compose-preview-empty">预览生成失败，请稍后再试。</div>';
            draftState.textContent = '预览生成失败';
        }
    }

    function runCommand(command) {
        switch (command) {
            case 'undo': undoEdit(); break;
            case 'redo': redoEdit(); break;
            case 'h2':
            case 'bold':
            case 'quote':
            case 'code':
            case 'list':
            case 'link':
                applyBackendFormat(command);
                break;
            case 'image': imageInput.click(); break;
            case 'import-md': markdownInput.click(); break;
            case 'preview': requestBackendPreview(); break;
            default: break;
        }
    }

    function togglePlanFields() {
        const value = planSelection.value;
        document.querySelectorAll('.plan-existing-field').forEach(el => el.style.display = value === 'existing' ? 'grid' : 'none');
        document.querySelectorAll('.plan-new-field').forEach(el => el.style.display = value === 'new' ? 'grid' : 'none');
        document.querySelectorAll('.plan-order-field').forEach(el => el.style.display = value === 'none' ? 'none' : 'grid');
    }

    function restoreLocalDraft() {
        const raw = localStorage.getItem(localDraftKey);
        if (!raw || titleInput.value.trim() || textarea.value.trim()) return;
        try {
            const draft = JSON.parse(raw);
            titleInput.value = draft.title || '';
            textarea.value = draft.content || '';
            draftState.textContent = '已恢复本地草稿';
        } catch (error) {
            draftState.textContent = '未暂存';
        }
    }

    document.querySelectorAll('[data-command]').forEach(button => {
        button.addEventListener('click', () => runCommand(button.dataset.command));
    });
    document.querySelectorAll('.ll-compose-cover-option').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.ll-compose-cover-option').forEach(item => item.classList.remove('is-selected'));
            button.classList.add('is-selected');
            document.getElementById('defaultCoverSelection').value = button.dataset.coverUrl;
        });
    });

    settingsToggle.addEventListener('click', () => {
        settings.hidden = !settings.hidden;
        settingsToggle.textContent = settings.hidden ? '发文设置⌄' : '收起设置⌃';
    });
    settingsClose.addEventListener('click', () => {
        settings.hidden = true;
        settingsToggle.textContent = '发文设置⌄';
    });
    document.getElementById('outlineCollapseButton').addEventListener('click', () => {
        document.body.classList.toggle('is-outline-collapsed');
    });
    imageInput.addEventListener('change', event => uploadEditorImage(event.target.files?.[0]));
    markdownInput.addEventListener('change', event => importMarkdownFile(event.target.files?.[0]));
    planSelection.addEventListener('change', togglePlanFields);
    titleInput.addEventListener('input', () => { pushHistory(); scheduleDraftSave(); updateMetrics(); });
    textarea.addEventListener('input', () => { pushHistory(); scheduleDraftSave(); updateMetrics(); });
    textarea.addEventListener('keydown', event => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
            event.preventDefault();
            undoEdit();
            return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'y') {
            event.preventDefault();
            redoEdit();
            return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'b') {
            event.preventDefault();
            applyBackendFormat('bold');
            return;
        }
        if (event.key === 'Tab') {
            event.preventDefault();
            insertText('    ', '', '');
        }
        if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
            event.preventDefault();
            form.querySelector('button[name="action"][value="publish"]').click();
        }
    });

    restoreLocalDraft();
    togglePlanFields();
    updateMetrics();
    lastSnapshot = snapshotEditor();
</script>
</body>
</html>
