<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - 烂柯的博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">烂柯的博客</span>
            </a>
            <nav class="ll-header-links">
                <a class="ll-header-link" href="/">首页</a>
                <a class="ll-header-link" href="/posts">文章</a>
                <a class="ll-header-link" href="/about">关于</a>
                <a class="ll-header-link" href="/space" sec:authorize="isAuthenticated()">个人空间</a>
            </nav>
            <div class="ll-header-actions">
                <form class="ll-header-form" action="/search" method="get">
                    <input class="ll-search" type="search" name="keyword" placeholder="搜索 Markdown 文章" th:value="${keyword}">
                    <button class="ll-search-submit" type="submit">搜索</button>
                </form>
                <a class="ll-header-link" href="https://github.com/CjhAIIt" target="_blank" rel="noreferrer">GitHub</a>
                <a class="ll-header-link" href="/posts/new" sec:authorize="isAuthenticated()">写博客</a>
            </div>
        </header>

        <div class="ll-category-row">
            <nav class="ll-category-links">
                <a class="ll-category-link" th:classappend="${selectedCategory == 'latest' ? ' is-active' : ''}" href="/posts">最新</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'frontend-backend' ? ' is-active' : ''}" href="/posts?category=frontend-backend">前后端</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'embedded' ? ' is-active' : ''}" href="/posts?category=embedded">嵌入式</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'big-data' ? ' is-active' : ''}" href="/posts?category=big-data">大数据</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'project' ? ' is-active' : ''}" href="/posts?category=project">项目</a>
            </nav>
        </div>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div th:if="${message}" class="ll-status ll-status--success"><span th:text="${message}"></span></div>
        <div th:if="${error}" class="ll-status ll-status--error"><span th:text="${error}"></span></div>

        <section class="ll-page-head ll-fade">
            <div>
                <h1 class="ll-page-title" th:text="${keyword != null ? '搜索结果' : '全部文章'}">全部文章</h1>
                <p class="ll-page-desc" th:if="${keyword != null}" th:text="${'当前关键词：' + keyword}">关键词</p>
                <p class="ll-page-desc" th:if="${keyword == null}">这里按时间倒序展示文章，也可以按分类筛选。</p>
            </div>
            <div class="ll-inline-actions">
                <a class="ll-btn" href="/posts/new" sec:authorize="isAuthenticated()">写新文章</a>
                <a class="ll-btn-secondary" href="/space" sec:authorize="isAuthenticated()">我的空间</a>
            </div>
        </section>

        <section class="ll-grid" th:if="${!#lists.isEmpty(posts)}">
            <article class="ll-card ll-fade" th:each="post, stat : ${posts}">
                <div th:class="${'ll-card-media ' + (stat.index % 4 == 0 ? 'll-card-media--a' : (stat.index % 4 == 1 ? 'll-card-media--b' : (stat.index % 4 == 2 ? 'll-card-media--c' : 'll-card-media--d')))}">
                    <span class="ll-media-badge" th:text="${post.categoryDisplayName}">分类</span>
                    <span class="ll-media-mark" th:text="${stat.count < 10 ? '0' + stat.count : stat.count}">01</span>
                </div>
                <div class="ll-card-body">
                    <h2 class="ll-card-title">
                        <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">标题</a>
                    </h2>
                    <p class="ll-card-excerpt" th:text="${@markdownService.excerpt(post.content, 120)}">摘要</p>
                    <div class="ll-card-meta">
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2026-03-19</span>
                        <a class="ll-side-link" th:href="@{/users/{username}(username=${post.author.username})}" th:text="${post.author.username}">作者</a>
                        <a class="ll-side-link" th:href="@{/posts/{id}(id=${post.id})}">阅读全文</a>
                    </div>
                </div>
            </article>
        </section>

        <div th:if="${#lists.isEmpty(posts)}" class="ll-empty ll-fade">
            当前没有符合条件的文章。
        </div>

        <footer class="ll-footer">
            <span>© 2026 烂柯的博客</span>
            <span> · Article List · </span>
            <a href="https://github.com/CjhAIIt" target="_blank" rel="noreferrer">CjhAIIt</a>
        </footer>
    </div>
</main>
</body>
</html>
