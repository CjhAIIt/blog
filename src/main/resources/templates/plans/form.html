<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle + ' - 计划分区'}">计划表单</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">博客</span>
            </a>
            <nav class="ll-header-links">
                <a class="ll-header-link" href="/">首页</a>
                <a class="ll-header-link" href="/posts">文章</a>
                <a class="ll-header-link is-active" href="/plans">计划</a>
                <a class="ll-header-link" href="/space" sec:authorize="isAuthenticated()">个人空间</a>
            </nav>
        </header>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div th:if="${message}" class="ll-status ll-status--success"><span th:text="${message}"></span></div>
        <div th:if="${error}" class="ll-status ll-status--error"><span th:text="${error}"></span></div>

        <section class="ll-page-head ll-fade">
            <div>
                <h1 class="ll-page-title" th:text="${pageTitle}">新建计划</h1>
                <p class="ll-page-desc">计划分区用于把零散文章串成长期专题路线，共创计划允许他人加入，私密计划仅创建者可加入。</p>
            </div>
        </section>

        <form class="ll-editor-card ll-fade" th:object="${plan}" th:action="${formAction}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="ll-settings-grid">
                <div class="ll-form-field">
                    <label class="ll-form-label" for="name">计划名称</label>
                    <input class="ll-input" type="text" id="name" th:field="*{name}" maxlength="80" placeholder="例如：Spring 系列计划">
                </div>
                <div class="ll-form-field">
                    <label class="ll-form-label" for="accessType">计划类型</label>
                    <select class="ll-select" id="accessType" th:field="*{accessType}">
                        <option th:each="accessType : ${planAccessTypes}" th:value="${accessType}" th:text="${accessType.displayName}">计划类型</option>
                    </select>
                </div>
                <div class="ll-form-field">
                    <label class="ll-form-label" for="expectedCount">预计文章数量</label>
                    <input class="ll-input" type="number" id="expectedCount" th:field="*{expectedCount}" min="0" placeholder="例如：12">
                </div>
                <div class="ll-form-field">
                    <label class="ll-form-label" for="status">计划状态</label>
                    <select class="ll-select" id="status" th:field="*{status}">
                        <option value="0">进行中</option>
                        <option value="1">已完结</option>
                        <option value="2">已搁置</option>
                    </select>
                </div>
                <div class="ll-form-field" style="grid-column: span 3;">
                    <label class="ll-form-label" for="description">计划简介</label>
                    <textarea class="ll-textarea" id="description" th:field="*{description}" rows="8" placeholder="介绍这个计划的目标、适合谁阅读、预计更新节奏。"></textarea>
                </div>
            </div>

            <div class="ll-form-actions">
                <button class="ll-btn" type="submit">保存计划</button>
                <a class="ll-btn-secondary" href="/plans">返回计划分区</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
