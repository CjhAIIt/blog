<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 烂柯的博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">烂柯的博客</span>
            </a>
            <nav class="ll-header-links">
                <a class="ll-header-link" href="/">首页</a>
                <a class="ll-header-link" href="/about">关于</a>
                <a class="ll-header-link" href="/register">注册</a>
            </nav>
        </header>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div class="ll-auth-layout">
            <section class="ll-auth-side ll-fade">
                <span class="ll-auth-kicker">Login</span>
                <h1 class="ll-auth-title">登录后进入你的 Markdown 写作空间。</h1>
                <p class="ll-auth-copy">账号启用前必须完成邮箱验证。登录后可以发布 Markdown 文章、管理个人空间和查看自己的创作列表。</p>
            </section>

            <section class="ll-auth-card ll-fade">
                <span class="ll-auth-kicker">Sign In</span>
                <h2 class="ll-side-title">欢迎回来</h2>
                <p class="ll-side-text">使用已验证邮箱对应的账号登录。</p>

                <div th:if="${successMessage}" class="ll-status ll-status--success"><span th:text="${successMessage}"></span></div>
                <div th:if="${param.error}" class="ll-status ll-status--error">登录失败，请确认账号密码正确，并且邮箱已经完成验证。</div>
                <div th:if="${param.logout}" class="ll-status ll-status--success">你已退出登录。</div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="username">用户名</label>
                        <input class="ll-input" type="text" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="password">密码</label>
                        <input class="ll-input" type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="ll-form-actions">
                        <button class="ll-btn" type="submit">登录</button>
                        <a class="ll-btn-secondary" href="/register">去注册</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>
</body>
</html>
