<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烂柯的博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">烂柯的博客</span>
            </a>

            <nav class="ll-header-links">
                <a class="ll-header-link" href="/">首页</a>
                <a class="ll-header-link" href="/posts">文章</a>
                <a class="ll-header-link" href="/about">关于</a>
                <a class="ll-header-link" href="/space" sec:authorize="isAuthenticated()">个人空间</a>
            </nav>

            <div class="ll-header-actions">
                <form class="ll-header-form" action="/search" method="get">
                    <input class="ll-search" type="search" name="keyword" placeholder="搜索 Markdown 文章">
                    <button class="ll-search-submit" type="submit">搜索</button>
                </form>
                <a class="ll-header-link" href="https://github.com/CjhAIIt" target="_blank" rel="noreferrer">GitHub</a>
                <a class="ll-header-link" href="/login" sec:authorize="isAnonymous()">登录</a>
                <a class="ll-header-link" href="/register" sec:authorize="isAnonymous()">注册</a>
                <a class="ll-header-link" href="/posts/new" sec:authorize="isAuthenticated()">写博客</a>
                <form class="ll-inline-form" th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="ll-header-link ll-button-reset" type="submit">退出</button>
                </form>
            </div>
        </header>

        <div class="ll-category-row">
            <nav class="ll-category-links">
                <a class="ll-category-link" th:classappend="${selectedCategory == 'latest' ? ' is-active' : ''}" href="/">最新</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'frontend-backend' ? ' is-active' : ''}" href="/?category=frontend-backend">前后端</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'embedded' ? ' is-active' : ''}" href="/?category=embedded">嵌入式</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'big-data' ? ' is-active' : ''}" href="/?category=big-data">大数据</a>
                <a class="ll-category-link" th:classappend="${selectedCategory == 'project' ? ' is-active' : ''}" href="/?category=project">项目</a>
            </nav>
        </div>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div th:if="${message}" class="ll-status ll-status--success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="ll-status ll-status--error">
            <span th:text="${error}"></span>
        </div>

        <section class="ll-page-head ll-fade">
            <div>
                <h1 class="ll-page-title">欢迎来到实验室博客首页。</h1>
                <p class="ll-page-desc">写文章时直接用 Markdown，发布后自动渲染。现在首页固定五个分类：最新、前后端、嵌入式、大数据、项目。</p>
            </div>
            <div class="ll-inline-actions">
                <a class="ll-btn" href="/posts/new" sec:authorize="isAuthenticated()">开始写博客</a>
                <a class="ll-btn-secondary" href="/space" sec:authorize="isAuthenticated()">进入个人空间</a>
                <a class="ll-btn-secondary" href="/register" sec:authorize="isAnonymous()">注册账号</a>
            </div>
        </section>

        <section class="ll-grid" th:if="${!#lists.isEmpty(posts)}">
            <article class="ll-card ll-fade" th:each="post, stat : ${posts}">
                <div th:class="${'ll-card-media ' + (stat.index % 4 == 0 ? 'll-card-media--a' : (stat.index % 4 == 1 ? 'll-card-media--b' : (stat.index % 4 == 2 ? 'll-card-media--c' : 'll-card-media--d')))}">
                    <span class="ll-media-badge" th:text="${post.categoryDisplayName}">项目</span>
                    <span class="ll-media-mark" th:text="${stat.count < 10 ? '0' + stat.count : stat.count}">01</span>
                </div>
                <div class="ll-card-body">
                    <h2 class="ll-card-title">
                        <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">文章标题</a>
                    </h2>
                    <p class="ll-card-excerpt" th:text="${@markdownService.excerpt(post.content, 120)}">文章摘要</p>
                    <div class="ll-card-meta">
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2026-03-19</span>
                        <a class="ll-side-link" th:href="@{/users/{username}(username=${post.author.username})}" th:text="${post.author.username}">作者</a>
                        <a class="ll-side-link" th:href="@{/posts/{id}(id=${post.id})}">阅读全文</a>
                    </div>
                </div>
            </article>
        </section>

        <div th:if="${#lists.isEmpty(posts)}" class="ll-empty ll-fade">
            当前分类还没有文章。
            <a href="/posts/new" sec:authorize="isAuthenticated()">写第一篇</a>
        </div>

        <nav class="ll-pagination" th:if="${totalPages > 1}">
            <a class="ll-page-link" th:if="${currentPage > 0}" th:href="@{/(page=${currentPage - 1}, category=${selectedCategory})}">上一页</a>
            <span class="ll-page-link" th:if="${currentPage == 0}">上一页</span>
            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a class="ll-page-link" th:classappend="${i == currentPage ? ' is-active' : ''}" th:href="@{/(page=${i}, category=${selectedCategory})}" th:text="${i + 1}">1</a>
            </th:block>
            <a class="ll-page-link" th:if="${currentPage + 1 < totalPages}" th:href="@{/(page=${currentPage + 1}, category=${selectedCategory})}">下一页</a>
            <span class="ll-page-link" th:if="${currentPage + 1 >= totalPages}">下一页</span>
        </nav>

        <footer class="ll-footer">
            <span>© 2026 烂柯的博客</span>
            <span> · Markdown / Personal Space / Email Verify · </span>
            <a href="https://github.com/CjhAIIt" target="_blank" rel="noreferrer">CjhAIIt</a>
        </footer>
    </div>
</main>
</body>
</html>
