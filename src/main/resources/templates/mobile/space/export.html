<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{mobile/fragments/layout :: head('导出博客')}"></head>
<body class="mb-body">
<div class="mb-shell">
    <header th:replace="~{mobile/fragments/layout :: header}"></header>
</div>

<main class="mb-main">
    <div class="mb-shell mb-stack">
        <div th:replace="~{mobile/fragments/layout :: alerts}"></div>

        <section class="mb-hero mb-hero--export">
            <div class="mb-meta-ribbon">内容导出</div>
            <span class="mb-hero-kicker">导出</span>
            <h1 class="mb-hero-title">导出个人博客</h1>
            <p class="mb-hero-copy">需要备份时，可以把公开文章和 Markdown 一起打包下来。</p>
            <div class="mb-hero-stats">
                <article class="mb-hero-stat">
                    <span>可导出文章</span>
                    <strong th:text="${#lists.size(exportPosts)}">0</strong>
                </article>
                <article class="mb-hero-stat">
                    <span>包含 Markdown</span>
                    <strong>是</strong>
                </article>
                <article class="mb-hero-stat">
                    <span>包含元数据</span>
                    <strong>是</strong>
                </article>
                <article class="mb-hero-stat">
                    <span>下载格式</span>
                    <strong>ZIP</strong>
                </article>
            </div>
            <div class="mb-actions">
                <a class="mb-btn" href="/space/export/download">下载导出包</a>
                <a class="mb-btn-secondary" href="/space">返回空间</a>
            </div>
        </section>

        <section class="mb-card mb-card--ink">
            <div class="mb-section-head">
                <div>
                    <h2 class="mb-section-title">导出内容</h2>
                    <div class="mb-section-note">下载前先看一眼，心里更有数。</div>
                </div>
            </div>
            <div class="mb-quick-grid">
                <div class="mb-quick-link">
                    <strong>公开文章</strong>
                    <span>会带上文章页面和摘要，方便之后继续整理。</span>
                </div>
                <div class="mb-quick-link">
                    <strong>Markdown 原文</strong>
                    <span>如果以后迁移平台，原文可以继续用。</span>
                </div>
                <div class="mb-quick-link mb-quick-link--wide">
                    <strong>基础信息</strong>
                    <span>会包含标题、时间、分类这些公开内容，不会打包密码、评论等隐私数据。</span>
                </div>
            </div>
        </section>

        <section class="mb-card mb-card--soft">
            <div class="mb-section-head">
                <div>
                    <h2 class="mb-section-title">这次会导出的文章</h2>
                    <div class="mb-section-note" th:text="${#lists.size(exportPosts) + ' 篇公开文章'}">0 篇公开文章</div>
                </div>
            </div>
            <div class="mb-list" th:if="${!#lists.isEmpty(exportPosts)}">
                <div class="mb-post-card" th:each="post : ${exportPosts}">
                    <div class="mb-post-meta">
                        <span th:text="${post.categoryDisplayName}">分类</span>
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2026-04-10</span>
                    </div>
                    <h3 class="mb-post-title" th:text="${post.title}">文章标题</h3>
                    <p class="mb-post-excerpt" th:text="${@markdownService.excerpt(post.content, 96)}">摘要</p>
                    <div class="mb-author-badges">
                        <span class="mb-badge-pill">准备打包</span>
                        <span class="mb-badge-pill">含 Markdown</span>
                    </div>
                </div>
            </div>
            <div class="mb-empty" th:if="${#lists.isEmpty(exportPosts)}">还没有可导出的公开文章。</div>
        </section>
    </div>
</main>

<div class="mb-shell">
    <nav th:replace="~{mobile/fragments/layout :: tabbar('space')}"></nav>
</div>
</body>
</html>
