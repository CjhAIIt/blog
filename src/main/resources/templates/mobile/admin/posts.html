<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{mobile/fragments/layout :: head('文章控制台')}"></head>
<body class="mb-body">
<div class="mb-shell">
    <header th:replace="~{mobile/fragments/layout :: header}"></header>
</div>

<main class="mb-main">
    <div class="mb-shell mb-stack">
        <div th:replace="~{mobile/fragments/layout :: alerts}"></div>

        <section class="mb-hero mb-hero--admin">
            <div class="mb-meta-ribbon" th:text="${uiCopy.mobile.hero}">云上高阁，文华先行</div>
            <span class="mb-hero-kicker">精选 / 置顶</span>
            <h1 class="mb-hero-title">文章控制台</h1>
            <p class="mb-hero-copy" th:text="${uiCopy.mobile.popular + '；重要篇章可置顶先行。'}">锦绣文章，芳华独赏；重要篇章可置顶先行。</p>
            <div class="mb-hero-stats">
                <article class="mb-hero-stat">
                    <span>文章数</span>
                    <strong th:text="${#lists.size(allPosts)}">0</strong>
                </article>
                <article class="mb-hero-stat">
                    <span>管理员</span>
                    <strong th:text="${currentUser.displayName}">Admin</strong>
                </article>
            </div>
        </section>

        <section class="mb-card">
            <div class="mb-section-head">
                <div>
                    <h2 class="mb-section-title">择章标记</h2>
                    <div class="mb-section-note">精选为金，置顶为红。</div>
                </div>
            </div>

            <div class="mb-list" th:if="${!#lists.isEmpty(allPosts)}">
                <article class="mb-post-card" th:each="post : ${allPosts}" th:classappend="${post.pinned ? ' mb-post-card--pinned' : ''}">
                    <div class="mb-post-meta">
                        <span class="mb-tag mb-tag--featured" th:if="${post.featured}">精选</span>
                        <span class="mb-tag mb-tag--pinned" th:if="${post.pinned}">置顶</span>
                        <span th:text="${post.statusDisplayName}">已发布</span>
                        <span th:text="${post.likeCount + ' 赞'}">0 赞</span>
                    </div>
                    <h3 class="mb-post-title"><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">文章标题</a></h3>
                    <p class="mb-post-excerpt" th:text="${post.author.displayName + ' · ' + post.categoryDisplayName}">作者 · 分类</p>
                    <div class="mb-form-actions">
                        <form th:action="@{/admin/posts/{id}/feature(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="mb-btn-secondary" type="submit" th:text="${post.featured ? '取消精选' : '设为精选'}">设为精选</button>
                        </form>
                        <form th:action="@{/admin/posts/{id}/pin(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="mb-btn-secondary" type="submit" th:text="${post.pinned ? '取消置顶' : '设为置顶'}">设为置顶</button>
                        </form>
                    </div>
                </article>
            </div>
            <div class="mb-empty" th:if="${#lists.isEmpty(allPosts)}" th:text="${uiCopy.mobile.empty}">风起云涌，暂无内容。</div>
        </section>
    </div>
</main>

<div class="mb-shell">
    <nav th:replace="~{mobile/fragments/layout :: tabbar('posts')}"></nav>
</div>
</body>
</html>
