<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑个人资料 - 烂柯的博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">烂柯的博客</span>
            </a>
            <nav class="ll-header-links">
                <a class="ll-header-link" href="/space">个人空间</a>
                <a class="ll-header-link" href="/space/drafts">草稿箱</a>
                <a class="ll-header-link" href="/posts/new">写文章</a>
            </nav>
        </header>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div th:if="${message}" class="ll-status ll-status--success"><span th:text="${message}"></span></div>
        <div th:if="${error}" class="ll-status ll-status--error"><span th:text="${error}"></span></div>

        <section class="ll-section-card ll-fade">
            <h1 class="ll-page-title">编辑个人资料</h1>
            <p class="ll-page-desc">这里可以修改用户名、密码、简介和头像。修改用户名或密码时，需要先输入当前密码确认。</p>

            <form th:object="${profileForm}" action="/space/edit" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="ll-upload-box ll-upload-box--profile">
                    <div class="ll-upload-preview ll-upload-preview--avatar">
                        <img id="avatarPreview" th:src="*{existingAvatarUrl}" alt="头像预览">
                    </div>
                    <div class="ll-upload-fields">
                        <label class="ll-form-label" for="avatarFile">个人头像</label>
                        <input class="ll-input" type="file" id="avatarFile" name="avatarFile" accept=".jpg,.jpeg,.png,.webp,.gif">
                        <label class="ll-checkbox">
                            <input type="checkbox" name="useDefaultAvatar" value="true">
                            <span>恢复默认头像</span>
                        </label>
                        <p class="ll-form-note">支持 JPG、PNG、WEBP、GIF，未上传时会使用默认头像图。</p>
                    </div>
                </div>

                <div class="ll-settings-grid">
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="username">用户名</label>
                        <input class="ll-input" type="text" id="username" th:field="*{username}" placeholder="3 到 20 个字符" required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="qq">QQ</label>
                        <input class="ll-input" type="text" id="qq" th:field="*{qq}" placeholder="填写 QQ 号">
                    </div>
                </div>

                <div class="ll-form-field">
                    <label class="ll-form-label" for="bio">自我介绍</label>
                    <textarea class="ll-textarea" id="bio" th:field="*{bio}" placeholder="写一点关于自己的介绍..."></textarea>
                </div>

                <div class="ll-settings-grid">
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="githubUrl">GitHub 主页</label>
                        <input class="ll-input" type="text" id="githubUrl" th:field="*{githubUrl}" placeholder="例如 https://github.com/yourname">
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="personalBlogUrl">个人博客地址</label>
                        <input class="ll-input" type="text" id="personalBlogUrl" th:field="*{personalBlogUrl}" placeholder="例如 https://yourname.github.io/blog/">
                    </div>
                </div>

                <div class="ll-settings-grid">
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="currentPassword">当前密码</label>
                        <input class="ll-input" type="password" id="currentPassword" th:field="*{currentPassword}" placeholder="修改用户名或密码时必填" autocomplete="current-password">
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="newPassword">新密码</label>
                        <input class="ll-input" type="password" id="newPassword" th:field="*{newPassword}" placeholder="留空则不修改密码" autocomplete="new-password">
                    </div>
                </div>

                <div class="ll-form-field">
                    <label class="ll-form-label" for="confirmPassword">确认新密码</label>
                    <input class="ll-input" type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="再次输入新密码" autocomplete="new-password">
                </div>

                <div class="ll-form-actions">
                    <button class="ll-btn" type="submit">保存资料</button>
                    <a class="ll-btn-secondary" href="/space/drafts">草稿箱</a>
                    <a class="ll-btn-secondary" href="/space/export">导出博客</a>
                    <a class="ll-btn-secondary" href="/space">返回空间</a>
                </div>
            </form>
        </section>
    </div>
</main>

<script>
    const avatarInput = document.getElementById('avatarFile');
    const avatarPreview = document.getElementById('avatarPreview');

    avatarInput?.addEventListener('change', () => {
        const file = avatarInput.files?.[0];
        if (!file) {
            return;
        }
        avatarPreview.src = URL.createObjectURL(file);
    });
</script>
</body>
</html>
