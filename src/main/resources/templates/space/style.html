<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>空间风格 - 博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">博客</span>
            </a>
            <nav class="ll-header-links">
                <a class="ll-header-link" href="/space">个人空间</a>
                <a class="ll-header-link" href="/space/edit">资料设置</a>
                <a class="ll-header-link" href="/space/drafts">草稿箱</a>
            </nav>
            <div class="ll-header-actions">
                <a class="ll-header-link" href="/notifications">消息</a>
                <a class="ll-header-link" href="/space/export">导出博客</a>
            </div>
        </header>
    </div>
</div>

<main class="ll-main ll-style-page">
    <div class="ll-shell">
        <section class="ll-style-hero">
            <div>
                <span class="ll-kicker">完全自定义风格</span>
                <h1 class="ll-space-title">把个人空间装修成自己的样子</h1>
                <p class="ll-space-copy">背景、主题色、字体、签名、简介和兴趣标签都可以实时预览。保存后，别人访问你的空间会自动加载这套风格。</p>
            </div>
            <div class="ll-style-hero-actions">
                <a class="ll-btn-secondary" href="/space">返回空间</a>
                <a class="ll-btn-secondary" href="/space/edit">编辑账号资料</a>
            </div>
        </section>

        <section class="ll-style-editor"
                 data-space-style-editor
                 th:attr="data-initial-style=${spaceStyleJson},data-versions=${spaceStyleVersionsJson}">
            <aside class="ll-style-panel">
                <div class="ll-style-panel-head">
                    <div>
                        <h2>风格控制台</h2>
                        <p>选择模板，也可以继续微调每个细节。</p>
                    </div>
                    <div class="ll-style-status" data-role="status"></div>
                </div>

                <section class="ll-style-section">
                    <h3>预设模板</h3>
                    <div class="ll-style-template-grid">
                        <button type="button" data-template="clean"><span style="background:#2563eb"></span>清爽白</button>
                        <button type="button" data-template="ink"><span style="background:#8b5cf6"></span>暗色灵感</button>
                        <button type="button" data-template="garden"><span style="background:#477a5b"></span>绿意书房</button>
                        <button type="button" data-template="sunset"><span style="background:#c2410c"></span>暖调手账</button>
                        <button type="button" data-template="ocean"><span style="background:#0f766e"></span>远山海面</button>
                    </div>
                </section>

                <section class="ll-style-section">
                    <h3>背景和颜色</h3>
                    <div class="ll-style-field-grid">
                        <label>
                            背景颜色
                            <input type="color" data-field="backgroundColor">
                        </label>
                        <label>
                            主题色
                            <input type="color" data-field="themeColor">
                        </label>
                    </div>
                    <label class="ll-style-upload">
                        <span>上传背景图片</span>
                        <input type="file" data-field="backgroundFile" accept="image/*">
                    </label>
                    <button type="button" class="ll-style-mini-action" data-action="clearBackground">移除背景图片</button>
                </section>

                <section class="ll-style-section">
                    <h3>字体</h3>
                    <select class="ll-input" data-field="fontFamily">
                        <option value="Inter, system-ui, sans-serif">现代无衬线</option>
                        <option value="Georgia, 'Times New Roman', serif">经典衬线</option>
                        <option value="'SFMono-Regular', Consolas, 'Liberation Mono', monospace">代码等宽</option>
                        <option value="'Trebuchet MS', 'Arial Rounded MT Bold', system-ui, sans-serif">圆润标题</option>
                    </select>
                </section>

                <section class="ll-style-section">
                    <h3>简介和标签</h3>
                    <label>
                        个人简介
                        <textarea class="ll-textarea" data-field="profile" maxlength="600"></textarea>
                    </label>
                    <label>
                        签名
                        <input class="ll-input" type="text" data-field="signature" maxlength="120">
                    </label>
                    <label>
                        兴趣标签
                        <input class="ll-input" type="text" data-field="tagInput" placeholder="输入后按 Enter 添加">
                    </label>
                    <div class="ll-style-tag-list" data-role="tagList"></div>
                </section>

                <section class="ll-style-section">
                    <h3>历史版本</h3>
                    <div class="ll-style-version-list" data-role="versionList"></div>
                </section>

                <div class="ll-style-actions">
                    <button type="button" class="ll-btn-secondary" data-action="cancel">取消修改</button>
                    <button type="button" class="ll-btn-secondary" data-action="reset">恢复默认</button>
                    <button type="button" class="ll-btn" data-action="save">保存风格</button>
                </div>
            </aside>

            <section class="ll-style-preview" data-role="preview">
                <div class="ll-style-preview-card">
                    <div class="ll-profile-inline ll-profile-inline--hero">
                        <img class="ll-avatar-photo ll-avatar-photo--xl" th:src="${currentUser.displayAvatarUrl}" th:alt="${currentUser.username}">
                        <div>
                            <div class="ll-space-display-name" th:text="${currentUser.displayName}">用户名</div>
                            <div class="ll-space-handle" th:text="${'@' + currentUser.username}">@username</div>
                        </div>
                    </div>
                    <h2>个人空间预览</h2>
                    <p class="ll-style-signature" data-preview="signature">在这里写一句签名。</p>
                    <p class="ll-style-profile" data-preview="profile">还没有写个人简介。</p>
                    <div class="ll-style-preview-tags" data-preview="tags"></div>
                    <div class="ll-style-preview-metrics">
                        <span>文章</span>
                        <span>互动</span>
                        <span>草稿</span>
                    </div>
                </div>
            </section>
        </section>
    </div>
</main>

<script src="/js/components/shared/SpaceStyleEditor.js"></script>
<script>
    document.querySelectorAll('[data-space-style-editor]').forEach((root) => {
        window.SpaceStyleEditor.init(root);
    });
</script>
</body>
</html>
