<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 博客</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ll-page">
<div class="ll-topbar-wrap">
    <div class="ll-shell">
        <header class="ll-topbar">
            <a class="ll-brand" href="/">
                <span class="ll-brand-mark">LK</span>
                <span class="ll-brand-name">博客</span>
            </a>
            <nav class="ll-header-links">
                <a class="ll-header-link" href="/">首页</a>
                <a class="ll-header-link" href="/about">关于</a>
                <a class="ll-header-link" href="/login">登录</a>
            </nav>
        </header>
    </div>
</div>

<main class="ll-main">
    <div class="ll-shell">
        <div class="ll-auth-layout">
            <section class="ll-auth-side ll-fade">
                <span class="ll-auth-kicker">Register</span>
                <h1 class="ll-auth-title">创建账号并提交实名认证</h1>
                <p class="ll-auth-copy">
                    注册时必须填写真实姓名。提交后会进入管理员审核，审核通过前可以登录和完善资料，但不能写博客。
                </p>
            </section>

            <section class="ll-auth-card ll-fade">
                <span class="ll-auth-kicker">Create Account</span>
                <h2 class="ll-side-title">开始注册</h2>
                <p class="ll-side-text">真实姓名仅用于站内实名审核，用户名仍然是你的登录名和主页地址。</p>

                <div th:if="${error}" class="ll-status ll-status--error"><span th:text="${error}"></span></div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="username">用户名</label>
                        <input class="ll-input" type="text" id="username" th:field="*{username}" placeholder="3 到 20 个字符" required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="realName">真实姓名</label>
                        <input class="ll-input"
                               type="text"
                               id="realName"
                               th:field="*{realName}"
                               maxlength="5"
                               pattern="[\u4E00-\u9FFF]{1,5}"
                               placeholder="1 到 5 个中文字符"
                               required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="email">邮箱</label>
                        <input class="ll-input" type="email" id="email" th:field="*{email}" placeholder="name@example.com" required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="password">密码</label>
                        <input class="ll-input" type="password" id="password" th:field="*{password}" placeholder="至少 8 位" required>
                    </div>
                    <div class="ll-form-field">
                        <label class="ll-form-label" for="confirmPassword">确认密码</label>
                        <input class="ll-input" type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入密码" required>
                    </div>
                    <div class="ll-side-card">
                        <h3 class="ll-side-title">注册后流程</h3>
                        <ul class="ll-side-list">
                            <li>提交账号后，实名认证会自动进入管理员审核列表。</li>
                            <li>审核通过前不能写博客、导入 Markdown 或编辑文章。</li>
                            <li>如果审核被驳回，可以到个人资料页修改实名信息后重新提交。</li>
                        </ul>
                    </div>
                    <div class="ll-form-actions">
                        <button class="ll-btn" type="submit">创建账号</button>
                        <a class="ll-btn-secondary" href="/login">已有账号</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>
</body>
</html>
